{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}

  <!-- SEO Meta Tags -->
  <meta name="description" content="{{ page.meta.description or config.site_description }}">
  <meta name="author" content="{{ config.site_author }}">
  <meta name="keywords" content="{{ page.meta.keywords or 'java, kotlin, functional programming, software design, testing, spring boot, software engineering' }}">

  <!-- Open Graph Meta Tags -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{ page.title }} | {{ config.site_name }}">
  <meta property="og:description" content="{{ page.meta.description or config.site_description }}">
  <meta property="og:url" content="{{ page.canonical_url }}">
  <meta property="og:site_name" content="{{ config.site_name }}">
  {% if page.meta.image %}
  <meta property="og:image" content="{{ config.site_url }}/{{ page.meta.image }}">
  {% else %}
  <meta property="og:image" content="{{ config.site_url }}/img/me.jpeg">
  {% endif %}

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }} | {{ config.site_name }}">
  <meta name="twitter:description" content="{{ page.meta.description or config.site_description }}">
  {% if page.meta.image %}
  <meta name="twitter:image" content="{{ config.site_url }}/{{ page.meta.image }}">
  {% else %}
  <meta name="twitter:image" content="{{ config.site_url }}/img/me.jpeg">
  {% endif %}

  <!-- Canonical URL -->
  <link rel="canonical" href="{{ page.canonical_url }}">
{% endblock %}

{% block content %}
  {{ super() }}

  <!-- ShareThis Buttons -->
  <div style="margin-top: 2rem; padding: 1rem 7px;">
    <div class="sop"></div>
  </div>

  <!-- Giscus Comments -->
  <div class="giscus-comments" style="padding-bottom: 2rem; padding-left: 7px; padding-right: 7px;">
    <script src="https://giscus.app/client.js"
            data-repo="etrandafir93/etrandafir93"
            data-repo-id="R_kgDOMA5rWQ"
            data-category="General"
            data-category-id="DIC_kwDOMA5rWc4C0Ujw"
            data-mapping="pathname"
            data-strict="1"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="bottom"
            data-theme="catppuccin_frappe"
            data-lang="en"
            crossorigin="anonymous"
            async>
    </script>
  </div>
{% endblock %}
